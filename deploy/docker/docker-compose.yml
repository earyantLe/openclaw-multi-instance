version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: openclaw-postgres
    environment:
      POSTGRES_DB: openclaw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openclaw_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-openclaw_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service
  auth-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.auth
    container_name: openclaw-auth
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: openclaw
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-openclaw_secret}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 24h
      LOG_LEVEL: info
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Instance Service
  instance-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.instance
    container_name: openclaw-instance
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: openclaw
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-openclaw_secret}
      AUTH_SERVICE_URL: http://auth-service:3001
      INSTANCE_MANAGER_PATH: /app/deploy-core/instance-manager.sh
      BACKUP_SCRIPT_PATH: /app/scripts/backup.sh
      LOG_LEVEL: info
    ports:
      - "3002:3002"
    volumes:
      - openclaw_instances:/home/node/.openclaw/instances
      - openclaw_backups:/home/node/.openclaw/backups
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy

  # Web Console
  web-console:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: openclaw-web
    environment:
      NODE_ENV: production
      VITE_API_URL: http://localhost:3002
      VITE_AUTH_URL: http://localhost:3001
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - instance-service

  # NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: openclaw-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - web-console

volumes:
  postgres_data:
  redis_data:
  openclaw_instances:
  openclaw_backups:

networks:
  default:
    name: openclaw-network

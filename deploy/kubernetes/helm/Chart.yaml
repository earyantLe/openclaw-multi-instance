apiVersion: v2
name: openclaw
description: Enterprise Multi-Instance Management System for OpenClaw
type: application
version: 2.0.0
appVersion: "2.0.0"
keywords:
  - openclaw
  - multi-instance
  - enterprise
  - rbac
  - multi-tenant
maintainers:
  - name: OpenClaw Team
    email: team@openclaw.io

dependencies:
  - name: postgresql
    version: 15.0.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 19.0.0
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

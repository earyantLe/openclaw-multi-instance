# CI/CD Configuration for OpenClaw Enterprise
# GitHub Actions Workflow

name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'
  DOCKER_REGISTRY: ghcr.io/${{ github.repository }}

jobs:
  # ===========================
  # Lint & Test
  # ===========================
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Build all packages
        run: npm run build

  # ===========================
  # Security Scan
  # ===========================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ===========================
  # Build Docker Images
  # ===========================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.auth
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/auth-service:latest
            ${{ env.DOCKER_REGISTRY }}/auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push instance-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.instance
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/instance-service:latest
            ${{ env.DOCKER_REGISTRY }}/instance-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web-console
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.web
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/web-console:latest
            ${{ env.DOCKER_REGISTRY }}/web-console:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================
  # Deploy to Staging
  # ===========================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/master'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to staging
        run: |
          kubectl apply -f deploy/kubernetes/manifests.yaml -n openclaw-staging
          kubectl set image deployment/auth-service auth-service=${{ env.DOCKER_REGISTRY }}/auth-service:${{ github.sha }} -n openclaw-staging
          kubectl set image deployment/instance-service instance-service=${{ env.DOCKER_REGISTRY }}/instance-service:${{ github.sha }} -n openclaw-staging
          kubectl set image deployment/web-console web-console=${{ env.DOCKER_REGISTRY }}/web-console:${{ github.sha }} -n openclaw-staging
          kubectl rollout status deployment/auth-service -n openclaw-staging
          kubectl rollout status deployment/instance-service -n openclaw-staging
          kubectl rollout status deployment/web-console -n openclaw-staging

  # ===========================
  # Deploy to Production (Manual)
  # ===========================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to production
        run: |
          kubectl apply -f deploy/kubernetes/manifests.yaml -n openclaw
          kubectl set image deployment/auth-service auth-service=${{ env.DOCKER_REGISTRY }}/auth-service:${{ github.sha }} -n openclaw
          kubectl set image deployment/instance-service instance-service=${{ env.DOCKER_REGISTRY }}/instance-service:${{ github.sha }} -n openclaw
          kubectl set image deployment/web-console web-console=${{ env.DOCKER_REGISTRY }}/web-console:${{ github.sha }} -n openclaw
          kubectl rollout status deployment/auth-service -n openclaw
          kubectl rollout status deployment/instance-service -n openclaw
          kubectl rollout status deployment/web-console -n openclaw

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
